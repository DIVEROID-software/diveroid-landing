<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Download DIVEROID App</title>
    <link rel="icon" href="/assets/favicon.ico" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
          "Noto Sans KR", sans-serif;
        background: linear-gradient(180deg, #0a1929 0%, #0d2742 100%);
        color: #fff;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 20px;
        text-align: center;
      }
      .logo {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.2em;
        color: #50a9fc;
        margin-bottom: 32px;
      }
      .title {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 12px;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 16px;
        color: #a8c4e0;
        margin-bottom: 40px;
        line-height: 1.5;
        max-width: 320px;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(80, 169, 252, 0.2);
        border-top-color: #50a9fc;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 24px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .buttons {
        display: none;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        max-width: 320px;
      }
      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 16px 24px;
        background: #50a9fc;
        color: #fff;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 600;
        font-size: 16px;
        transition:
          background 0.2s,
          transform 0.1s;
      }
      .btn:hover {
        background: #3d8de0;
      }
      .btn:active {
        transform: scale(0.98);
      }
      .btn.secondary {
        background: rgba(255, 255, 255, 0.08);
      }
      .btn.secondary:hover {
        background: rgba(255, 255, 255, 0.14);
      }
      .btn svg {
        width: 20px;
        height: 20px;
      }
      .footer {
        margin-top: 48px;
        font-size: 12px;
        color: #5a7a99;
      }
      .footer a {
        color: #5a7a99;
        text-decoration: none;
      }
      .footer a:hover {
        color: #a8c4e0;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">DIVEROID</div>
      <h1 class="title" id="title">Opening App Store…</h1>
      <p class="subtitle" id="subtitle">
        If the page doesn't open automatically, choose your device below.
      </p>

      <div class="spinner" id="spinner"></div>

      <div class="buttons" id="buttons">
        <a
          class="btn"
          href="https://apps.apple.com/app/id1501474558"
          id="ios-btn"
        >
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"
            />
          </svg>
          Download for iPhone
        </a>
        <a
          class="btn secondary"
          href="https://play.google.com/store/apps/details?id=com.ao.diveroid"
          id="android-btn"
        >
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M3.6 1.2C3.2 1.6 3 2.2 3 3v18c0 .8.2 1.4.6 1.8l.1.1L13.7 12 3.7 1.1l-.1.1zM17.6 8.5L14.7 6.8 5.5 1.5c-.5-.3-1-.4-1.4-.2l11 11 2.5-3.8zM21.5 10.6l-2.7-1.6-2.7 4 2.7 4 2.7-1.6c1.3-.8 1.3-2.1 0-2.8zM4.1 22.7c.4.2.9.1 1.4-.2l9.2-5.3 2.9-1.7-3.9-3.9L4.1 22.7z"
            />
          </svg>
          Download for Android
        </a>
      </div>

      <div class="footer">
        <a href="https://www.diveroid.com">www.diveroid.com</a>
      </div>
    </div>

    <script>
      (function () {
        var IOS_URL = "https://apps.apple.com/app/id1501474558";
        var ANDROID_URL =
          "https://play.google.com/store/apps/details?id=com.ao.diveroid";
        var ua = navigator.userAgent || navigator.vendor || window.opera || "";
        var isAndroid = /android/i.test(ua);
        var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

        function showManual(titleText, subtitleText) {
          document.getElementById("spinner").style.display = "none";
          document.getElementById("title").textContent = titleText;
          document.getElementById("subtitle").textContent = subtitleText;
          document.getElementById("buttons").style.display = "flex";
        }

        if (isAndroid) {
          document.getElementById("title").textContent = "Opening Google Play…";
          window.location.replace(ANDROID_URL);
          setTimeout(function () {
            showManual(
              "Tap to download",
              "If Google Play didn’t open, tap below.",
            );
          }, 1500);
        } else if (isIOS) {
          document.getElementById("title").textContent = "Opening App Store…";
          window.location.replace(IOS_URL);
          setTimeout(function () {
            showManual(
              "Tap to download",
              "If the App Store didn’t open, tap below.",
            );
          }, 1500);
        } else {
          showManual(
            "Choose your device",
            "Open this page on your phone, or pick your platform below.",
          );
        }
      })();
    </script>
  </body>
</html>
