<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DIVEROID — Season 2</title>
    <meta
      name="description"
      content="DIVEROID Season 2 Coming Soon. 고객지원은 정상 운영 중입니다."
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        font-family:
          "Inter",
          -apple-system,
          "Apple SD Gothic Neo",
          "Noto Sans KR",
          sans-serif;
      }
      a {
        text-decoration: none;
        color: inherit;
      }

      /* ── Background Slideshow ── */
      .bg-slides {
        position: fixed;
        inset: 0;
        z-index: 0;
      }
      .bg-slide {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        opacity: 0;
        transition: opacity 2.2s ease-in-out;
        filter: blur(2px) brightness(0.52);
        transform: scale(1.04);
      }
      .bg-slide.active {
        opacity: 1;
      }
      .bg-slide:nth-child(1) {
        background-image: url("assets/images/bg-2.jpg");
      }
      .bg-slide:nth-child(2) {
        background-image: url("assets/images/bg-1.jpg");
      }
      .bg-slide:nth-child(3) {
        background-image: url("assets/images/bg-3.jpg");
      }
      .bg-slide:nth-child(4) {
        background-image: url("assets/images/bg-4.jpg");
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 1;
        background: linear-gradient(
          170deg,
          rgba(2, 30, 80, 0.52) 0%,
          rgba(0, 20, 60, 0.68) 55%,
          rgba(0, 5, 22, 0.82) 100%
        );
        backdrop-filter: blur(2px);
      }

      /* ── Nav ── */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 22px 48px;
      }
      .nav-logo {
        font-size: 18px;
        font-weight: 900;
        letter-spacing: 0.14em;
        color: #fff;
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .lang-switcher {
        display: flex;
        align-items: center;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 999px;
        overflow: hidden;
        backdrop-filter: blur(8px);
      }
      .lang-btn {
        padding: 6px 14px;
        font-size: 11px;
        font-weight: 700;
        background: transparent;
        border: none;
        color: rgba(255, 255, 255, 0.45);
        cursor: pointer;
        transition:
          background 0.2s,
          color 0.2s;
        letter-spacing: 0.04em;
      }
      .lang-btn.active {
        background: rgba(255, 255, 255, 0.16);
        color: #fff;
      }
      .lang-divider {
        width: 1px;
        height: 14px;
        background: rgba(255, 255, 255, 0.18);
      }

      .nav-chat-btn {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 8px 18px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        backdrop-filter: blur(8px);
        transition: background 0.2s;
      }
      .nav-chat-btn:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #22c55e;
        box-shadow: 0 0 6px #22c55e;
        animation: pulse 2s infinite;
      }
      @keyframes borderGlow {
        0%,
        100% {
          box-shadow:
            0 0 24px rgba(72, 202, 228, 0.25),
            0 0 60px rgba(0, 150, 199, 0.15),
            inset 0 1px 0 rgba(144, 224, 239, 0.3);
          border-color: rgba(144, 224, 239, 0.45);
        }
        50% {
          box-shadow:
            0 0 36px rgba(72, 202, 228, 0.5),
            0 0 80px rgba(0, 150, 199, 0.28),
            inset 0 1px 0 rgba(144, 224, 239, 0.5);
          border-color: rgba(144, 224, 239, 0.8);
        }
      }
      @keyframes oceanFlow {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.6;
          transform: scale(0.82);
        }
      }

      /* ── Main ── */
      .main {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 24px 32px;
        overflow-y: auto;
      }

      /* Badge */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 18px;
        border-radius: 999px;
        border: 1px solid rgba(80, 169, 252, 0.35);
        background: rgba(80, 169, 252, 0.12);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.18em;
        color: #50a9fc;
        text-transform: uppercase;
        margin-bottom: 24px;
        backdrop-filter: blur(8px);
      }
      .badge-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #50a9fc;
        box-shadow: 0 0 8px #50a9fc;
        animation: pulse 2s infinite;
      }

      /* ── Letter Card (카드 제거 — 투명 컨테이너) ── */
      .letter-card {
        width: 100%;
        max-width: 900px;
        background: none;
        border: none;
        padding: 0 16px;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* Headline — OceanWick 흐르는 그라디언트 텍스트 */
      .l-headline {
        font-size: clamp(32px, 3.6vw, 58px);
        font-weight: 900;
        font-family: "Pretendard", "Apple SD Gothic Neo", sans-serif;
        background: linear-gradient(
          90deg,
          #72d2f0 0%,
          #50a9fc 25%,
          #3a60d8 50%,
          #50a9fc 75%,
          #72d2f0 100%
        );
        background-size: 250% 100%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 0.03em;
        word-spacing: 0.06em;
        margin-bottom: 16px;
        line-height: 1.25;
        text-align: center;
        filter: drop-shadow(0 0 24px rgba(80, 169, 252, 0.55));
        animation: oceanFlow 20s ease-in-out infinite;
      }
      .l-sub {
        font-size: clamp(20px, 2.4vw, 38px);
        font-weight: 700;
        font-family: "Pretendard", "Apple SD Gothic Neo", sans-serif;
        background: linear-gradient(
          90deg,
          #3a60d8 0%,
          #50a9fc 25%,
          #72d2f0 50%,
          #50a9fc 75%,
          #3a60d8 100%
        );
        background-size: 250% 100%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 0.02em;
        margin-bottom: 48px;
        line-height: 1.3;
        text-align: center;
        filter: drop-shadow(0 0 18px rgba(58, 96, 216, 0.5));
        animation: oceanFlow 26s ease-in-out infinite reverse;
      }

      /* 이메일 폼 + CS 영역 — 박스 없이 ambient glow만 */
      .l-bottom-panel {
        width: 100%;
        max-width: 560px;
        background: none;
        border: none;
        border-radius: 0;
        padding: 0 16px;
        backdrop-filter: none;
        box-shadow: none;
        position: relative;
      }
      .l-bottom-panel::before {
        content: "";
        position: absolute;
        inset: -40px -60px;
        background:
          radial-gradient(
            ellipse 70% 40% at 50% 20%,
            rgba(80, 169, 252, 0.12) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 60% 50% at 50% 80%,
            rgba(42, 56, 184, 0.14) 0%,
            transparent 65%
          );
        pointer-events: none;
        z-index: -1;
      }

      /* Email Form */
      .l-email-form {
        display: flex;
        gap: 8px;
        margin-bottom: 4px;
      }
      .l-email-input {
        flex: 1;
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid rgba(80, 169, 252, 0.45);
        background: linear-gradient(
          135deg,
          rgba(114, 210, 240, 0.1) 0%,
          rgba(58, 96, 216, 0.12) 100%
        );
        color: #fff;
        font-size: 13px;
        font-family: inherit;
        outline: none;
        box-shadow: inset 0 1px 0 rgba(114, 210, 240, 0.15);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .l-email-input::placeholder {
        color: rgba(180, 220, 255, 0.6);
      }
      .l-email-input:focus {
        border-color: rgba(80, 169, 252, 0.8);
        box-shadow:
          inset 0 1px 0 rgba(114, 210, 240, 0.15),
          0 0 0 3px rgba(80, 169, 252, 0.22);
      }
      .l-email-btn {
        padding: 12px 20px;
        border-radius: 12px;
        border: none;
        background: linear-gradient(
          120deg,
          #72d2f0 0%,
          #50a9fc 55%,
          #3a60d8 100%
        );
        color: #fff;
        font-size: 13px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        white-space: nowrap;
        transition:
          opacity 0.2s,
          transform 0.15s;
        box-shadow:
          0 4px 20px rgba(80, 169, 252, 0.5),
          0 1px 0 rgba(255, 255, 255, 0.25) inset;
      }
      .l-email-btn:hover {
        opacity: 0.88;
        transform: translateY(-1px);
      }

      /* Divider */
      .l-divider {
        width: 100%;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(80, 169, 252, 0.45) 40%,
          rgba(114, 210, 240, 0.45) 60%,
          transparent 100%
        );
        margin: 36px 0 28px;
      }

      /* CS Section */
      .l-cs-title {
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 8px;
      }
      .l-cs-body {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.62);
        line-height: 1.75;
        white-space: pre-line;
        margin-bottom: 16px;
      }
      .l-cs-items {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 24px;
      }
      .l-cs-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-radius: 12px;
        background: linear-gradient(
          135deg,
          rgba(114, 210, 240, 0.1) 0%,
          rgba(58, 96, 216, 0.12) 100%
        );
        border: 1px solid rgba(80, 169, 252, 0.3);
        font-size: 13px;
        color: rgba(255, 255, 255, 0.88);
      }
      .l-cs-item-icon {
        font-size: 16px;
        flex-shrink: 0;
      }
      .l-cs-item a {
        color: #90e0ef;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      .l-cs-item a:hover {
        color: #ade8f4;
      }

      /* Closing */
      .l-closing {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 10px;
      }
      .l-sign {
        font-size: 14px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.8);
      }

      /* Responsive — Mobile */
      @media (max-width: 640px) {
        nav {
          padding: 16px 20px;
        }
        .main {
          padding: 72px 20px 32px;
          justify-content: flex-start;
        }
        .badge {
          align-self: center;
          margin-bottom: 28px;
        }
        .letter-card {
          padding: 0;
          align-items: center;
        }
        .l-headline {
          font-size: clamp(32px, 9vw, 48px);
          text-align: center;
          word-break: keep-all;
          margin-bottom: 14px;
        }
        .l-sub {
          font-size: clamp(18px, 5.5vw, 28px);
          text-align: center;
          word-break: keep-all;
          margin-bottom: 36px;
        }
        .l-bottom-panel {
          width: 100%;
          padding: 0;
        }
        .l-email-form {
          flex-direction: column;
          gap: 10px;
        }
        .l-email-input {
          width: 100%;
          font-size: 15px;
          padding: 14px 16px;
        }
        .l-email-btn {
          width: 100%;
          font-size: 15px;
          padding: 14px 20px;
          text-align: center;
        }
        .l-cs-title {
          font-size: 15px;
        }
        .l-cs-body {
          font-size: 14px;
        }
        .l-cs-item {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Background -->
    <div class="bg-slides">
      <div class="bg-slide active"></div>
      <div class="bg-slide"></div>
      <div class="bg-slide"></div>
      <div class="bg-slide"></div>
    </div>
    <div class="overlay"></div>

    <!-- Nav -->
    <nav>
      <span class="nav-logo">DIVEROID</span>
      <div class="nav-right">
        <div class="lang-switcher">
          <button class="lang-btn active" id="btn-ko" onclick="setLang('ko')">
            KO
          </button>
          <div class="lang-divider"></div>
          <button class="lang-btn" id="btn-en" onclick="setLang('en')">
            EN
          </button>
        </div>
      </div>
    </nav>

    <!-- Main -->
    <div class="main">
      <div class="badge">
        <span class="badge-dot"></span>
        <span id="badge-text"></span>
      </div>

      <div class="letter-card">
        <!-- Headline -->
        <h2 class="l-headline" id="l-headline"></h2>
        <p class="l-sub" id="l-sub"></p>

        <div class="l-bottom-panel">
          <!-- Email Form -->
          <form
            class="l-email-form"
            id="l-email-form"
            onsubmit="handleEmailSubmit(event)"
          >
            <input
              class="l-email-input"
              type="email"
              id="l-email-input"
              required
            />
            <button class="l-email-btn" type="submit" id="l-email-btn"></button>
          </form>

          <div class="l-divider"></div>

          <!-- CS -->
          <p class="l-cs-title" id="l-cs-title"></p>
          <p class="l-cs-body" id="l-cs-body"></p>
          <div class="l-cs-items" id="l-cs-items"></div>

          <!-- Closing -->
          <p class="l-closing" id="l-closing"></p>
          <p class="l-sign" id="l-sign"></p>
        </div>
      </div>
    </div>

    <!-- i18n -->
    <script src="assets/i18n/landing.js"></script>
    <!-- CS Widget -->
    <script src="https://web-production-2bc5f.up.railway.app/widget.js?v=20260403"></script>

    <script>
      let currentLang = "ko";

      function render(lang) {
        const c = window.LANDING_CONTENT[lang];
        if (!c) return;
        document.documentElement.lang = lang;
        const L = c.letter;

        document.getElementById("badge-text").textContent = c.badge;
        document.getElementById("l-headline").textContent = L.headline;
        document.getElementById("l-sub").textContent = L.sub;
        document.getElementById("l-email-input").placeholder =
          L.emailPlaceholder;
        document.getElementById("l-email-btn").textContent = L.emailBtn;
        document.getElementById("l-cs-title").textContent = L.csTitle;
        document.getElementById("l-cs-body").textContent = L.csBody;
        document.getElementById("l-closing").textContent = L.closing;
        document.getElementById("l-sign").textContent = L.sign;

        document.getElementById("l-cs-items").innerHTML = L.csItems
          .map(
            (item) => `
            <div class="l-cs-item">
              <span class="l-cs-item-icon">${item.icon}</span>
              <span>${
                item.email
                  ? `<a href="mailto:${item.text}">${item.text}</a>`
                  : item.text
              }</span>
            </div>`,
          )
          .join("");
      }

      function setLang(lang) {
        currentLang = lang;
        render(lang);
        document
          .getElementById("btn-ko")
          .classList.toggle("active", lang === "ko");
        document
          .getElementById("btn-en")
          .classList.toggle("active", lang === "en");
        try {
          sessionStorage.setItem("lang", lang);
        } catch (e) {}
      }

      async function handleEmailSubmit(e) {
        e.preventDefault();
        const email = document.getElementById("l-email-input").value;
        const btn = document.getElementById("l-email-btn");
        const input = document.getElementById("l-email-input");

        btn.textContent = currentLang === "ko" ? "저장 중..." : "Saving...";
        btn.disabled = true;
        input.disabled = true;

        try {
          const res = await fetch("/api/subscribe", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, lang: currentLang }),
          });
          if (res.ok) {
            btn.textContent =
              currentLang === "ko" ? "신청 완료 🙏" : "Done! 🙏";
            setTimeout(() => {
              input.value = "";
              input.disabled = false;
              btn.disabled = false;
              btn.textContent =
                currentLang === "ko"
                  ? "가장 먼저 출시 소식 받기"
                  : "Get Early Access";
            }, 2500);
          } else {
            throw new Error("Failed");
          }
        } catch {
          btn.textContent =
            currentLang === "ko" ? "다시 시도해주세요" : "Try again";
          btn.disabled = false;
          input.disabled = false;
        }
      }

      function openChat() {
        const btn =
          document.getElementById("diveroid-chat-btn") ||
          document.querySelector("[data-diveroid-widget]") ||
          document.querySelector(".diveroid-widget-btn");
        if (btn) btn.click();
        else window.location.href = "mailto:help@diveroid.com";
      }

      // Slideshow
      const slides = document.querySelectorAll(".bg-slide");
      let cur = 0;
      setInterval(() => {
        slides[cur].classList.remove("active");
        cur = (cur + 1) % slides.length;
        slides[cur].classList.add("active");
      }, 5500);

      // Init
      (function () {
        const urlLang = new URLSearchParams(location.search).get("lang");
        const savedLang = (() => {
          try {
            return sessionStorage.getItem("lang");
          } catch (e) {}
        })();
        const initLang = ["ko", "en"].includes(urlLang)
          ? urlLang
          : ["ko", "en"].includes(savedLang)
            ? savedLang
            : "ko";
        setLang(initLang);
      })();
    </script>
  </body>
</html>
